title: 'Genially Landing'
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            handle: subtitle
            field:
              type: text
              display: Subtitle
          -
            handle: genailly_photo
            field:
              max_files: 1
              container: assets
              type: assets
              display: 'Genially Photo'
          -
            handle: genially_team_photo
            field:
              max_files: 2
              container: assets
              type: assets
              display: 'Genially Team Photo'
          -
            handle: course_title
            field:
              type: text
              display: 'Course Title'
          -
            handle: course_description
            field:
              type: text
              display: 'Course Description'
          -
            handle: author
            field:
              type: users
              display: Author
              default: current
              localizable: true
              max_items: 1
          -
            handle: template
            field:
              type: template
              display: Template
              localizable: true
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
          -
            handle: parent
            field:
              type: entries
              collections:
                - pages
              max_items: 1
              listable: false
              localizable: true
