title: Webinar
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: webinar_image
            field:
              max_files: 1
              container: assets
              type: assets
              display: 'Webinar Image'
          -
            handle: title
            field:
              type: text
              required: true
              validate:
                - required
          -
            handle: subtitle
            field:
              type: text
              display: Subtitle
          -
            handle: description
            field:
              type: textarea
              display: Description
          -
            handle: webinar_video
            field:
              type: video
              display: 'Webinar Video'
          -
            handle: video_chapters
            field:
              type: textarea
              display: 'Video Chapters'
          -
            handle: button
            field:
              type: text
              display: Button
          -
            handle: button_link
            field:
              type: link
              display: 'Button Link'
          -
            handle: genially
            field:
              type: text
              display: Genially
          -
            handle: content
            field:
              type: markdown
              display: Content
              localizable: true
          -
            handle: author
            field:
              type: users
              display: Author
              default: current
              localizable: true
              max_items: 1
          -
            handle: template
            field:
              type: template
              display: Template
              localizable: true
      -
        display: Ponentes
        fields:
          -
            handle: ponentes
            field:
              collections:
                - team
              type: entries
              display: Ponentes
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
