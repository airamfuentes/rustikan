<style>
  .content-box {
    transform:
      perspective(800px)
      rotateY(25deg) scale(0.9)
      rotateX(10deg);
    transition: 0.6s ease all;
  }

  .content-box:hover {
    transform:
      perspective(800px)
      rotateY(-15deg)
      translateY(-20px)
      rotateX(10deg)
  }
</style>

<section class="pb-8">
    <div class="flex items-center flex-col pt-4 bg-[#1681f5] text-white font-bold">
      <h1 class="text-3xl pb-3">GamificApps</h1>
      <h3 class="pb-5 text-center">Aplicaciones y herramientas para llevar las gamificaciones al siguiente nivel.</h3>
    </div>

    <div class="flex flex-wrap justify-center gap-2 px-4 py-4 bg-[#0e2d4e]">
      <button
        data-filter="all"
        onclick="filterItems('gamificapps-grid', 'all', this)"
        class="filter-btn-gamificapps border-2 border-black rounded-2xl text-white bg-[#ff7414] hover:bg-[#cd5e12] px-3 py-1 text-sm font-semibold active-filter">
        Todos
      </button>
      {{ collection:gamificapps }}
        {{ if tags }}
          {{ tags }}
            <button
              data-filter="{{ slug }}"
              onclick="filterItems('gamificapps-grid', '{{ slug }}', this)"
              class="filter-btn-gamificapps border-2 border-black rounded-2xl text-white bg-[#ff7414] hover:bg-[#cd5e12] px-3 py-1 text-sm font-semibold">
              {{ title }}
            </button>
          {{ /tags }}
        {{ /if }}
      {{ /collection:gamificapps }}
    </div>

    <div id="gamificapps-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 p-8 max-w-7xl mx-auto">
      {{ collection:gamificapps }}
      <div
        class="bg-neutral-300 p-4 rounded-lg flex justify-center items-center shadow-md content-box"
        data-tags="{{ tags }}{{ slug }} {{ /tags }}">
        <a href="{{ url }}">
          <img src="{{ app_image }}" class="max-w-full h-auto object-contain aspect-square">
        </a>
      </div>
      {{ /collection:gamificapps }}
    </div>
  </section>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    deduplicateButtons('filter-btn-gamificapps');
  });

  function deduplicateButtons(cls) {
    const seen = new Set();
    document.querySelectorAll('.' + cls + '[data-filter]').forEach(function (btn) {
      const val = btn.dataset.filter;
      if (val === 'all') return;
      if (seen.has(val)) {
        btn.remove();
      } else {
        seen.add(val);
      }
    });
  }

  function filterItems(gridId, tag, btn) {
    const grid = document.getElementById(gridId);
    const items = grid.querySelectorAll('[data-tags]');
    items.forEach(function (item) {
      if (tag === 'all') {
        item.style.display = '';
      } else {
        const tags = item.dataset.tags.trim().split(/\s+/);
        item.style.display = tags.includes(tag) ? '' : 'none';
      }
    });
  
    const cls = btn.className.match(/filter-btn-[a-z]+/);
    if (cls) {
      document.querySelectorAll('.' + cls[0]).forEach(function (b) {
        b.classList.remove('active-filter', 'ring-2', 'ring-white');
      });
    }
    btn.classList.add('active-filter', 'ring-2', 'ring-white');
  }
</script>

<style>
  .active-filter {
    outline: 3px solid white;
    outline-offset: 2px;
  }
</style>
