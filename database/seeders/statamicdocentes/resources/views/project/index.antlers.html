<div class="bg-blue-300">
    <div class="text-center bg-[#11375f] p-6 text-white font-bold">
        <h1 class="text-4xl pb-6 font-bold">PROYECTOS</h1>
        <h3>Os presentamos aquellos proyectos en los que estamos o hemos participando</h3>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 max-w-4xl min-h-screen mx-auto gap-4 mt-5 pb-8">
        {{ collection:projects }}
        <div v-for="project in projects" class="bg-orange-400 rounded-lg flex flex-col shadow-[-2px_2px_15px_] shadow-neutral-600">
            <div class="flex justify-center">
              <a href="{{ url }}">
                <img src="{{ project_image }}" class="md:rounded-t-lg md:rounded-tr-lg">
              </a>
            </div>
            <div class="flex flex-col text-blue-900 py-3 px-2 ">
                <div class="text-base font-semibold">
                    {{ title }}
                </div>
                <div class="mt-2 text-sm">
                    {{ description }}
                </div>
            </div>
        </div>
        {{ /collection:projects }}
    </div>
</div>
