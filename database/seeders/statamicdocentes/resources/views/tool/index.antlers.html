<div class="pb-8">
    <div class="flex items-center flex-col pt-4 bg-[#1681f5] text-white font-bold">
      <h1 class="text-3xl pb-3">Herramientas</h1>
    </div>

    <div class="flex flex-wrap justify-center gap-2 px-4 py-4 bg-[#0e2d4e]">
      <button
        data-filter="all"
        onclick="filterItems('tools-grid', 'all', this)"
        class="filter-btn-tools border-2 border-black rounded-2xl text-white bg-[#ff7414] hover:bg-[#cd5e12] px-3 py-1 text-sm font-semibold active-filter">
        Todos
      </button>
      {{ collection:tools }}
        {{ if tags }}
          {{ tags }}
            <button
              data-filter="{{ slug }}"
              onclick="filterItems('tools-grid', '{{ slug }}', this)"
              class="filter-btn-tools border-2 border-black rounded-2xl text-white bg-[#ff7414] hover:bg-[#cd5e12] px-3 py-1 text-sm font-semibold">
              {{ title }}
            </button>
          {{ /tags }}
        {{ /if }}
      {{ /collection:tools }}
    </div>

    <div class="max-w-7xl mx-auto">
        <div id="tools-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 pt-7">
            {{ collection:tools }}
            <div class="bg-gray-100" data-tags="{{ tags }}{{ slug }} {{ /tags }}">

                <div class="pb-3">
                    <p class="font-bold text-lg text-blue-500">{{ title }}</p>
                    <a href="{{ url }}">
                        <img src="{{ tool_image }}" class="w-full h-auto">
                    </a>
                    <p class="text-md">{{ subtitle }}</p>
                </div>

                <div class="flex flex-col items-start gap-1">
                    <a href="{{ url }}" class="mt-8 inline-block bg-blue-500 text-white px-6 py-1 rounded-full hover:bg-blue-600">Leer más>></a>
                    {{ if tags }}
                        {{ tags }}
                            <a href="/tags/{{ slug }}" class="border-2 border-black text-sm rounded-2xl text-white hover:text-[#e2e2e2] bg-[#ff7414] hover:bg-[#cd5e12] px-2 py-1">{{ title }}</a>
                        {{ /tags }}
                    {{ /if }}
                </div>
            </div>
            {{ /collection:tools }}
        </div>
    </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    deduplicateButtons('filter-btn-tools');
  });

  function deduplicateButtons(cls) {
    const seen = new Set();
    document.querySelectorAll('.' + cls + '[data-filter]').forEach(function (btn) {
      const val = btn.dataset.filter;
      if (val === 'all') return;
      if (seen.has(val)) {
        btn.remove();
      } else {
        seen.add(val);
      }
    });
  }

  function filterItems(gridId, tag, btn) {
    const grid = document.getElementById(gridId);
    const items = grid.querySelectorAll('[data-tags]');
    items.forEach(function (item) {
      if (tag === 'all') {
        item.style.display = '';
      } else {
        const tags = item.dataset.tags.trim().split(/\s+/);
        item.style.display = tags.includes(tag) ? '' : 'none';
      }
    });
    const cls = btn.className.match(/filter-btn-[a-z]+/);
    if (cls) {
      document.querySelectorAll('.' + cls[0]).forEach(function (b) {
        b.classList.remove('active-filter', 'ring-2', 'ring-white');
      });
    }
    btn.classList.add('active-filter', 'ring-2', 'ring-white');
  }
</script>

<style>
  .active-filter {
    outline: 3px solid white;
    outline-offset: 2px;
  }
</style>
