<div>
    <p class="text-4xl max-w-4xl pt-10 mx-auto font-bold">{{ title }}</p>
    {{ if tags }}
    <div class="flex gap-2 max-w-4xl mx-auto pt-2 pb-1 px-4 lg:px-0">
        {{ tags }}
            <a href="/tags/{{ slug }}" class="border-2 border-black rounded-2xl hover:text-[#e2e2e2] bg-[#ff7414] hover:bg-[#cd5e12] px-2 py-1 text-sm font-semibold">{{ title }}</a>
        {{ /tags }}
    </div>
    {{ /if }}
    <div class="flex gap-4 max-w-4xl mx-auto font-semibold py-5 text-left px-4 lg:px-0">
        <img src="{{ tool_image }}" width="500px" alt="">
        {{ description }}
    </div>

    <a href="{{ button_link }}" class="block max-w-4xl mx-auto rounded-xl bg-orange-400 font-bold">{{ button_text }}</a>
</div>

<hr><hr>

<div>
    <div class="max-w-4xl mx-auto">
        <span class="flex justify-end">
            {{ if second_button }}
                <a href="{{ second_button_link }}" class="block max-w-4xl mx-auto rounded-xl bg-orange-400 font-bold">{{ second_button }}</a>
            {{ /if }}
        </span>
        {{ if tool_video }}
            <iframe width="905" height="536" class="hidden md:block" src="{{ tool_video | embed_url }}" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            <div class="flex justify-center">
                <iframe width="380" height="336" class="md:hidden" src="{{ tool_video | embed_url }}" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
            </div>
        {{ /if }}
    </div>

    <p class="max-w-3xl mx-auto pt-5 text-xl">Entradas relacionadas:</p>
    <div class="grid grid-cols-3 max-w-3xl mx-auto gap-4 mb-7 pt-10">
        {{ collection:tools limit="3" }}
        <div>
            <a href="{{ url }}">
                <img src="{{ tool_image }}" class="rounded-lg">
            </a>
        </div>
        {{ /collection:tools }}
    </div>
</div>
